version: 1

source_roots:
  - Inbox/Telegram
  - Inbox/Text

intermediate_outputs:
  - Daily

knowledge_targets:
  - id: self_profile
    path: Wiki/Self/Profile.md
    purpose: Stable self-descriptions, motives, strengths, constraints
  - id: self_current_diagnosis
    path: Wiki/Self/Current Diagnosis.md
    purpose: Recent pattern shifts, issue signals, and current interpretation
  - id: self_today
    path: Wiki/Self/Today.md
    purpose: One daily focus chosen from todo, open questions, or recent diagnosis
  - id: self_todo
    path: Wiki/Self/TODO.md
    purpose: Follow-up actions derived from raw notes and recent diagnosis
  - id: self_tensions
    path: Wiki/Self/Tensions.md
    purpose: Repeating dilemmas, contradictions, unresolved friction
  - id: self_questions
    path: Wiki/Self/Open Questions.md
    purpose: Open identity questions and unfinished inquiry
  - id: concept_questions
    path: Wiki/Questions/*.md
    purpose: Concept notes, study summaries, and follow-up thinking prompts
  - id: themes
    path: Wiki/Themes/*.md
    purpose: Recurring topics such as health, work, family, money, habits
  - id: people
    path: Wiki/People/*.md
    purpose: Relationship knowledge and repeated references to people
  - id: events
    path: Wiki/Events/*.md
    purpose: Date-bound events and turning points
  - id: projects
    path: Wiki/Projects/*.md
    purpose: Ongoing work, plans, goals, execution notes
  - id: timeline
    path: Wiki/Timeline/*.md
    purpose: Period summaries and time-ordered transitions
  - id: public_profile
    path: site/index.html
    purpose: Public-facing profile page compiled from selected wiki pages only

compile_units:
  - name: stable_self_claim
    detect:
      - first-person descriptions of traits
      - repeated motives or values
      - self-assessed strengths or limitations
    emit:
      - self_profile
  - name: recurring_tension
    detect:
      - conflict between two desires
      - gap between ideal and behavior
      - repeated frustration or contradiction
    emit:
      - self_tensions
  - name: open_question
    detect:
      - identity question
      - unresolved direction question
      - repeated why/how prompt
    emit:
      - self_questions
  - name: current_diagnosis
    detect:
      - recent pattern shift across the last few days
      - possible issue signal or absence of acute issue signal
      - near-term interpretation worth tracking
    emit:
      - self_current_diagnosis
  - name: next_action
    detect:
      - explicit todo
      - action implied by recent diagnosis
      - obvious next step after study or reflection
    emit:
      - self_todo
  - name: today_focus
    detect:
      - first current todo when actionable work exists
      - otherwise first open question worth writing about
      - otherwise first recent diagnosis point worth observing
    emit:
      - self_today
  - name: completed_action
    detect:
      - explicit done marker
      - completed checkbox
      - completion note tied to an earlier todo
    emit:
      - self_todo
  - name: concept_note
    detect:
      - studied concept in a link or memo
      - idea worth restating in your own words
      - follow-up thinking prompts attached to a concept
    emit:
      - concept_questions
  - name: theme_signal
    detect:
      - repeated subject area
      - durable topic-specific lesson
      - health, work, family, money, habit, emotion signals
    emit:
      - themes
  - name: person_signal
    detect:
      - repeated references to a person
      - relational change or remembered interaction
    emit:
      - people
  - name: event_signal
    detect:
      - one-time event with date significance
      - turning point or memorable episode
    emit:
      - events
  - name: project_signal
    detect:
      - explicit goal
      - continuing effort or work thread
    emit:
      - projects
  - name: timeline_signal
    detect:
      - change over time
      - before/after comparison
      - period summary
    emit:
      - timeline

link_handling:
  preserve_url: true
  summarize_when_present: true
  summary_fields:
    - topic
    - key_point
    - why_it_matters_here
  write_back:
    - Daily
    - related Wiki page

task_markers:
  open:
    - "TODO:"
    - "[ ]"
    - "[]"
    - "- [ ]"
  done:
    - "DONE:"
    - "[x]"
    - "- [x]"
  completion_policy:
    - only explicit done markers close a task
    - move matched task from current todo to completed section
    - preserve completion note when available
  deletion_policy:
    - explicit removal instructions may delete listed tasks without marking them done

merge_policy:
  prefer_update_existing_page: true
  create_new_page_only_when_topic_is_distinct: true
  keep_evidence_links: true
  separate_fact_and_interpretation: true

public_profile_sources:
  - Wiki/Self/Profile.md
  - Wiki/Self/Career.md
  - Wiki/Self/Speaking.md
  - Wiki/Timeline/커리어.md
  - Wiki/Projects/스테이지-난이도-마법사.md
  - Wiki/Projects/학교탐정단-TRPG.md
  - Wiki/Projects/하이레시스.md

public_profile_rules:
  include:
    - stable public bio
    - selected career outcomes
    - speaking history
    - public-safe projects
    - working style and strengths
  exclude:
    - Inbox raw notes
    - Daily pages
    - family and child details
    - health records
    - unresolved internal tensions
    - open questions
    - direct phone number
  presentation:
    - keep site output separate from Wiki
    - prefer concise resume-like language
    - soften unresolved date discrepancies
    - leave a provenance note in the public page

wording_handling:
  human_input: Meta/wording-conflicts.md
  canonical_source: Meta/wording-map.yaml
  conflict_queue: Meta/wording-conflicts.md
  policy:
    - wording-conflicts.md is the source of truth for conflict decisions
    - if status is approved, use selected as canonical wording
    - if status is keep_distinct, preserve separate wording
    - if status is open, keep compiling with warning state
    - rewrite only listed targets when a conflict entry changes

compile_conflicts:
  types:
    - wording_conflict
  wording_conflict:
    definition: same meaning, different wording, and wording-conflicts.md has no approved decision for the current target
    resolution:
      approved_selection: auto_resolve
      keep_distinct: do_not_merge
      open: keep compiling and append to conflict queue
    scope:
      - Wiki
      - site
